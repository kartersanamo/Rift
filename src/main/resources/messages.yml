      confirm-invalid: "&cDelete cancelled. You must type the exact confirmation keyword."
      cancelled: "&eWarp delete cancelled."
    back:
      title: "&eBack"
      line1: "&7Return to the warp list."
      line2: "&7Your changes are saved instantly."
    info:
      title: "&bWarp Information"

